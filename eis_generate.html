<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIS_GENERATE // 防手震模擬工具</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg-card: #12121a;
  --bg-muted: #1c1c2e;
  --text: #ffffff;
  --text-muted: #6b7280;
  --border: #2a2a3a;
  --accent: #00ff88;
  --accent2: #ff00ff;
  --accent3: #00d4ff;
  --glow-sm: 0 0 5px var(--accent), 0 0 10px rgba(0,255,136,0.4);
  --glow-md: 0 0 10px var(--accent), 0 0 20px rgba(0,255,136,0.5), 0 0 40px rgba(0,255,136,0.3);
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Courier New', monospace;
  color: var(--text);
  overflow: hidden;
}

/* Circuit grid background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
  pointer-events: none;
  z-index: 100;
}

.ambient { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
.ambient--green { width: 500px; height: 500px; background: rgba(0,255,136,0.08); top: -150px; left: -150px; }
.ambient--magenta { width: 400px; height: 400px; background: rgba(255,0,255,0.05); bottom: -100px; right: -100px; }

#app {
  display: flex;
  height: 100vh;
}

#controls {
  position: relative;
  z-index: 200;
  width: 360px;
  overflow-y: auto;
  padding: 1rem 1.2rem 1.5rem;
  background: rgba(18,18,26,0.6);
  backdrop-filter: blur(8px);
  border-right: 1px solid var(--border);
}
#controls::-webkit-scrollbar { width: 8px; }
#controls::-webkit-scrollbar-track { background: var(--bg); }
#controls::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
#controls::-webkit-scrollbar-thumb:hover { background: var(--accent); }

#controls h1 {
  font-size: 1.1rem;
  font-weight: bold;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-shadow: 0 0 10px #00ff88, 0 0 30px #00ff8860;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 0.3rem;
}
#controls .app-sub {
  display: block;
  text-align: center;
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 1rem;
}
#controls .app-sub a { color: var(--text-muted); text-decoration: none; }
#controls .app-sub a:hover { color: var(--accent); }

#controls section {
  background: rgba(28,28,46,0.4);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 0.8rem 0.7rem;
  margin-bottom: 0.7rem;
}

#controls h2 {
  font-size: 0.68rem;
  margin: 0 0 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  font-weight: bold;
}
#controls h2::before { content: '// '; color: var(--accent2); }

#controls label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  font-size: 0.72rem;
  color: var(--text);
  margin-bottom: 0.35rem;
  letter-spacing: 0.02em;
}

#controls input[type="number"],
#controls input[type="text"],
#controls select {
  width: 140px;
  padding: 0.35rem 0.5rem;
  background: var(--bg-muted);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.72rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#controls input[type="number"]:focus,
#controls input[type="text"]:focus,
#controls select:focus {
  border-color: var(--accent);
  box-shadow: var(--glow-sm);
}
#controls input[type="color"] {
  width: 42px; height: 24px;
  border: 1px solid var(--border);
  background: var(--bg-muted);
  border-radius: 4px;
  cursor: pointer;
}
#controls input[type="checkbox"] {
  margin: 0;
  accent-color: var(--accent);
  width: 14px; height: 14px;
  cursor: pointer;
}
#controls input[type="file"] {
  width: 140px;
  font-size: 0.65rem;
  color: var(--text-muted);
  font-family: inherit;
}
#controls input[type="file"]::file-selector-button {
  background: var(--bg-muted);
  color: var(--accent3);
  border: 1px solid var(--border);
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.65rem;
  cursor: pointer;
  margin-right: 0.4rem;
}
#controls input[type="file"]::file-selector-button:hover { border-color: var(--accent3); }

#controls button {
  padding: 0.4rem 0.9rem;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  margin-right: 0.3rem;
  margin-top: 0.2rem;
}
#controls button:hover {
  background: var(--accent);
  color: var(--bg);
  box-shadow: var(--glow-md);
}
#controls button:disabled {
  border-color: var(--border);
  color: var(--text-muted);
  cursor: not-allowed;
  background: transparent;
  box-shadow: none;
}
#btnStop { border-color: var(--accent2); color: var(--accent2); }
#btnStop:hover { background: var(--accent2); color: var(--bg); box-shadow: 0 0 10px var(--accent2), 0 0 20px rgba(255,0,255,0.5); }
#btnExportFrames { border-color: var(--accent3); color: var(--accent3); }
#btnExportFrames:hover { background: var(--accent3); color: var(--bg); box-shadow: 0 0 10px var(--accent3), 0 0 20px rgba(0,212,255,0.5); }

.hint {
  font-size: 0.62rem;
  color: var(--text-muted);
  margin: 0.2rem 0 0.5rem;
  letter-spacing: 0.02em;
  line-height: 1.5;
}

.slider-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  column-gap: 8px;
  margin-bottom: 0.6rem;
  font-size: 0.72rem;
  color: var(--text);
}
.slider-row > span { grid-column: 1; grid-row: 1; }
.slider-row > input[type="number"] {
  grid-column: 2; grid-row: 1;
  width: 68px !important;
}
.slider-row > input[type="range"] {
  grid-column: 1 / span 2;
  grid-row: 2;
  width: 100%;
  margin-top: 0.3rem;
  accent-color: var(--accent);
}

#stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  overflow: hidden;
  position: relative;
  z-index: 200;
}
#preview {
  max-width: 100%;
  max-height: 100%;
  background: #000;
}

#previewTime {
  font-size: 0.7rem;
  color: var(--accent3);
  margin-top: 0.5rem;
  letter-spacing: 0.08em;
  font-family: inherit;
}
#exportProgress {
  font-size: 0.65rem;
  color: var(--accent);
  margin-top: 0.5rem;
  min-height: 14px;
  letter-spacing: 0.05em;
}

/* Background preset buttons */
.bg-presets {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
  margin-bottom: 0.7rem;
}
#controls .bg-preset {
  aspect-ratio: 1 / 1;
  width: 100%;
  padding: 0;
  margin: 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  background-color: var(--bg-muted);
  background-size: cover;
  background-position: center;
  transition: border-color 0.2s, box-shadow 0.2s, color 0.2s;
  position: relative;
  overflow: hidden;
  font-size: 1.6rem;
  color: var(--text-muted);
  text-transform: none;
  letter-spacing: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
#controls .bg-preset:hover {
  border-color: var(--accent3);
  box-shadow: 0 0 8px rgba(0,212,255,0.4);
  color: var(--accent3);
}
#controls .bg-preset.active {
  border-color: var(--accent);
  box-shadow: var(--glow-sm);
  color: var(--accent);
}
#controls .bg-preset--checker {
  background-color: #202830;
  background-image:
    linear-gradient(45deg, #e8e8e8 25%, transparent 25%),
    linear-gradient(-45deg, #e8e8e8 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #e8e8e8 75%),
    linear-gradient(-45deg, transparent 75%, #e8e8e8 75%);
  background-size: 14px 14px;
  background-position: 0 0, 0 7px, 7px -7px, -7px 0;
}
#controls .bg-preset--solid { background-color: #4080c0; background-image: none; }
#controls .bg-preset--gradient {
  background-color: transparent;
  background-image: linear-gradient(135deg, #202830 0%, #e8e8e8 100%);
}
#controls .bg-preset--image {
  background-color: var(--bg-muted);
  background-image: none;
  border-style: dashed;
}
</style>
</head>
<body>
<div class="ambient ambient--green"></div>
<div class="ambient ambient--magenta"></div>

<div id="app">
  <aside id="controls">
    <h1>EIS_Generate</h1>
    <span class="app-sub"><a href="index.html">&larr; JL2Os /</a> 防手震模擬工具</span>

    <section>
      <h2>影片規格</h2>
      <label>寬度 <input type="number" id="width" value="1280" min="64" step="2"></label>
      <label>高度 <input type="number" id="height" value="720" min="64" step="2"></label>
      <label>FPS <input type="number" id="fps" value="30" min="1" max="240"></label>
      <label>長度 (秒) <input type="number" id="duration" value="8" min="0.1" step="0.1"></label>
    </section>

    <section>
      <h2>相機內參</h2>
      <label>fx <input type="number" id="fx" value="1280" placeholder="預設 = 寬度"></label>
      <label>fy <input type="number" id="fy" value="1280" placeholder="預設 = 寬度"></label>
      <label>cx <input type="number" id="cx" value="640" placeholder="預設 = 寬/2"></label>
      <label>cy <input type="number" id="cy" value="360" placeholder="預設 = 高/2"></label>
    </section>

    <section>
      <h2>Gyro 規格</h2>
      <label>取樣率 (Hz) <input type="number" id="gyroRate" value="200" min="1" max="10000"></label>
      <p class="hint">固定輸出: gx=yaw, gy=pitch, gz=roll;檔案 orientation=xyz</p>
    </section>

    <section>
      <h2>晃動模型 (Sinusoidal)</h2>
      <p class="hint">振幅單位為度,頻率單位為 Hz;可拖曳或直接輸入數值</p>

      <div class="slider-row" data-pair="sinAx" data-min="0" data-max="30" data-step="0.1">
        <span>X 軸 (pitch) 振幅</span>
        <input type="number" id="sinAx" value="0" step="0.1">
      </div>
      <div class="slider-row" data-pair="sinFx" data-min="0" data-max="20" data-step="0.1">
        <span>X 軸 頻率</span>
        <input type="number" id="sinFx" value="1" step="0.1">
      </div>

      <div class="slider-row" data-pair="sinAy" data-min="0" data-max="30" data-step="0.1">
        <span>Y 軸 (yaw) 振幅</span>
        <input type="number" id="sinAy" value="3" step="0.1">
      </div>
      <div class="slider-row" data-pair="sinFy" data-min="0" data-max="20" data-step="0.1">
        <span>Y 軸 頻率</span>
        <input type="number" id="sinFy" value="2" step="0.1">
      </div>

      <div class="slider-row" data-pair="sinAz" data-min="0" data-max="30" data-step="0.1">
        <span>Z 軸 (roll) 振幅</span>
        <input type="number" id="sinAz" value="0" step="0.1">
      </div>
      <div class="slider-row" data-pair="sinFz" data-min="0" data-max="20" data-step="0.1">
        <span>Z 軸 頻率</span>
        <input type="number" id="sinFz" value="1" step="0.1">
      </div>
    </section>

    <section>
      <h2>場景 - 背景</h2>
      <select id="bgType" style="display:none;">
        <option value="checker" selected>checker</option>
        <option value="solid">solid</option>
        <option value="gradient">gradient</option>
        <option value="image">image</option>
      </select>
      <div class="bg-presets">
        <button type="button" class="bg-preset bg-preset--checker active" data-bg="checker" title="棋盤格"></button>
        <button type="button" class="bg-preset bg-preset--solid" data-bg="solid" title="純色"></button>
        <button type="button" class="bg-preset bg-preset--gradient" data-bg="gradient" title="漸層"></button>
        <button type="button" class="bg-preset bg-preset--image" data-bg="image" title="上傳圖片">+</button>
      </div>
      <label data-bg-param="checker,solid,gradient">主色 <input type="color" id="bgColor1" value="#202830"></label>
      <label data-bg-param="checker,gradient">副色 <input type="color" id="bgColor2" value="#e8e8e8"></label>
      <label data-bg-param="checker">棋盤格大小 <input type="number" id="bgCheckerSize" value="64" min="2"></label>
      <label data-bg-param="image">上傳圖片 <input type="file" id="bgImage" accept="image/*"></label>
    </section>

    <section>
      <h2>場景 - 圓球</h2>
      <label>顯示 <input type="checkbox" id="ballShow" checked></label>
      <label>半徑 <input type="number" id="ballR" value="60" min="1"></label>
      <label>X 位置 (相對畫面) <input type="number" id="ballCx" value="0.5" min="0" max="1" step="0.01"></label>
      <label>Y 位置 (相對畫面) <input type="number" id="ballCy" value="0.5" min="0" max="1" step="0.01"></label>
      <label>顏色 <input type="color" id="ballColor" value="#ff5050"></label>
    </section>

    <section>
      <h2>特徵物</h2>
      <label>顯示方向箭頭 + 角標 <input type="checkbox" id="markersShow"></label>
    </section>

    <section>
      <h2>預覽</h2>
      <button id="btnPlay">▶ 播放</button>
      <button id="btnStop">■ 停止</button>
      <div id="previewTime">t = 0.000 s</div>
    </section>

    <section>
      <h2>匯出</h2>
      <button id="btnExportFrames">下載 JPG 序列 + gcsv</button>
      <div id="exportProgress"></div>
    </section>
  </aside>

  <main id="stage">
    <canvas id="preview"></canvas>
  </main>
</div>

<!-- Dependency order matters: each script registers itself onto window.APP -->
<script src="eis_generate_src/math/mat3.js"></script>
<script src="eis_generate_src/math/so3.js"></script>
<script src="eis_generate_src/motion/sinusoidal.js"></script>
<script src="eis_generate_src/motion/index.js"></script>
<script src="eis_generate_src/scene/background.js"></script>
<script src="eis_generate_src/scene/ball.js"></script>
<script src="eis_generate_src/scene/markers.js"></script>
<script src="eis_generate_src/render/scene2d.js"></script>
<script src="eis_generate_src/render/warpGL.js"></script>
<script src="eis_generate_src/export/gcsv.js"></script>
<script src="eis_generate_src/export/frames.js"></script>
<script src="eis_generate_src/ui.js"></script>
<script src="eis_generate_src/main.js"></script>
<script>
(function () {
  const select = document.getElementById('bgType');
  const presets = document.querySelectorAll('.bg-preset');
  const params = document.querySelectorAll('[data-bg-param]');
  const color1 = document.getElementById('bgColor1');
  const color2 = document.getElementById('bgColor2');
  const solidEl = document.querySelector('.bg-preset--solid');
  const gradEl = document.querySelector('.bg-preset--gradient');
  const checkerEl = document.querySelector('.bg-preset--checker');

  function syncThumbnails() {
    const c1 = color1.value;
    const c2 = color2.value;
    solidEl.style.backgroundColor = c1;
    gradEl.style.backgroundImage = 'linear-gradient(135deg, ' + c1 + ' 0%, ' + c2 + ' 100%)';
    checkerEl.style.backgroundColor = c1;
    checkerEl.style.backgroundImage =
      'linear-gradient(45deg, ' + c2 + ' 25%, transparent 25%),' +
      'linear-gradient(-45deg, ' + c2 + ' 25%, transparent 25%),' +
      'linear-gradient(45deg, transparent 75%, ' + c2 + ' 75%),' +
      'linear-gradient(-45deg, transparent 75%, ' + c2 + ' 75%)';
  }

  function applyType(type) {
    presets.forEach(function (b) { b.classList.toggle('active', b.dataset.bg === type); });
    params.forEach(function (el) {
      const types = el.dataset.bgParam.split(',');
      el.style.display = types.indexOf(type) >= 0 ? '' : 'none';
    });
  }

  presets.forEach(function (btn) {
    btn.addEventListener('click', function () {
      const type = btn.dataset.bg;
      if (select.value !== type) {
        select.value = type;
        select.dispatchEvent(new Event('change', { bubbles: true }));
      }
      applyType(type);
    });
  });

  color1.addEventListener('input', syncThumbnails);
  color2.addEventListener('input', syncThumbnails);

  applyType(select.value);
  syncThumbnails();
})();
</script>
</body>
</html>
