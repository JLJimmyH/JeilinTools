<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JL2O</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --accent: #00ff88;
    --accent2: #ff00ff;
    --accent3: #00d4ff;
    --border: #2a2a3a;
    --card-size: 280px;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: auto;
    position: relative;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
  }

  /* Circuit grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .ambient {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
  }
  .ambient--green {
    width: 500px; height: 500px;
    background: rgba(0,255,136,0.08);
    top: -150px; left: -150px;
  }
  .ambient--magenta {
    width: 400px; height: 400px;
    background: rgba(255,0,255,0.05);
    bottom: -100px; right: -100px;
  }
  .ambient--cyan {
    width: 350px; height: 350px;
    background: rgba(0,212,255,0.05);
    bottom: -80px; left: 30%;
  }

  .hub {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    padding: 3rem 2rem;
    width: 100%;
  }

  .hub-title {
    font-size: 1.6rem;
    font-weight: bold;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-shadow: 0 0 10px #00ff88, 0 0 30px #00ff8860;
    text-transform: uppercase;
  }

  .tool-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-size), 1fr));
    gap: 1.5rem;
    width: 100%;
    max-width: 900px;
  }

  .tool-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    padding: 1.8rem 1rem 1.4rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(18, 18, 26, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: visible;
    min-height: 180px;
  }

  .tool-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .tool-card:hover {
    transform: translateY(-4px) scale(1.03);
    border-color: var(--c);
    box-shadow: 0 0 20px var(--cg), 0 0 40px var(--cg), inset 0 0 20px var(--cg);
  }
  .tool-card:hover::before {
    opacity: 1;
    background: radial-gradient(ellipse at center, var(--cg), transparent 70%);
  }
  .tool-card:active {
    transform: scale(0.97);
  }

  /* Per-card accent colors */
  .tool-card[data-accent="green"]  { --c: #00ff88; --cg: rgba(0,255,136,0.15); }
  .tool-card[data-accent="magenta"] { --c: #ff00ff; --cg: rgba(255,0,255,0.15); }
  .tool-card[data-accent="cyan"]   { --c: #00d4ff; --cg: rgba(0,212,255,0.15); }

  .tool-emoji {
    font-size: 2.8rem;
    color: var(--c);
    text-shadow:
      0 0 10px var(--c),
      0 0 20px var(--cg);
    animation: emojiGlow 2.5s ease-in-out infinite;
    margin-bottom: 0.8rem;
    line-height: 1.2;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
  }

  .tool-name {
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--c);
    margin-bottom: 0.4rem;
    font-weight: bold;
  }

  .tool-desc {
    font-size: 0.68rem;
    color: #888;
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.04em;
  }

  @keyframes emojiGlow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
  }

  /* ── Mobile ──────────────────────────────────────────────── */
  @media (max-width: 600px) {
    body { min-height: 100dvh; }
    .hub { padding: 2rem 1rem; gap: 1.5rem; }
    .hub-title { font-size: 1.2rem; }
    .tool-grid { gap: 1rem; }
    .tool-card { padding: 1.4rem 0.8rem 1.2rem; min-height: 150px; }
    .tool-emoji { font-size: 2rem; }
    .ambient--green  { width: 250px; height: 250px; }
    .ambient--magenta { width: 200px; height: 200px; }
    .ambient--cyan    { width: 180px; height: 180px; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .tool-emoji { animation: none; }
    .tool-card { transition: none; }
  }
</style>
</head>
<body>
  <div class="ambient ambient--green"></div>
  <div class="ambient ambient--magenta"></div>
  <div class="ambient ambient--cyan"></div>

  <div class="hub">
    <div class="hub-title">// JL2Os</div>
    <div class="tool-grid">
      <a href="JLViewer.html" class="tool-card" data-accent="green">
        <div class="tool-emoji">ก็็็็็็็็็็็็็ʕ•͡ᴥ•ʔก้้้้้้้้้้้ </div>
        <div class="tool-name">Viewer</div>
        <div class="tool-desc">影像檢視器，支援 RAW / YUV / JR2 等多種格式</div>
      </a>
      <a href="frame-compare.html" class="tool-card" data-accent="magenta">
        <div class="tool-emoji">(╯°□°)╯︵┻━┻</div>
        <div class="tool-name">Frame Compare</div>
        <div class="tool-desc">影片逐幀比較，支援並排、滑動、差異模式</div>
      </a>
      <a href="ms_clock.html" class="tool-card" data-accent="cyan">
        <div class="tool-emoji">(⏱ ͜ʖ⏱)</div>
        <div class="tool-name">Clock</div>
        <div class="tool-desc">毫秒精度時鐘，相機延遲測試用</div>
      </a>
      <a href="pattern-gen.html" class="tool-card" data-accent="green">
        <div class="tool-emoji">◆▲●</div>
        <div class="tool-name">Pattern Gen</div>
        <div class="tool-desc">Image Quality 測試圖產生器，ISP / Camera 調校用</div>
      </a>
      <a href="eis_generate.html" class="tool-card" data-accent="cyan">
        <div class="tool-emoji">∿∿📷∿∿</div>
        <div class="tool-name">EIS Generate</div>
        <div class="tool-desc">合成晃動測試影片 + 對齊 gyro，EIS 防手震驗證用</div>
      </a>
    </div>
  </div>
</body>
</html>
