<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JL2 Viewer</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --accent: #00ff88;
    --accent2: #ff00ff;
    --accent3: #00d4ff;
    --border: #2a2a3a;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* Circuit grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .ambient {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
  }
  .ambient--green {
    width: 500px; height: 500px;
    background: rgba(0,255,136,0.08);
    top: -150px; left: -150px;
  }
  .ambient--magenta {
    width: 400px; height: 400px;
    background: rgba(255,0,255,0.05);
    bottom: -100px; right: -100px;
  }
  .ambient--cyan {
    width: 350px; height: 350px;
    background: rgba(0,212,255,0.05);
    bottom: -80px; left: 30%;
  }

  .card {
    padding: 3rem 3.5rem;
    position: relative;
    z-index: 1;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    justify-content: center;
    align-items: center;
  }

  .tool-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    font-size: 4rem;
    color: var(--accent);
    position: relative;
    text-shadow:
      0 0 10px #00ff88,
      0 0 20px #00ff8880,
      0 0 40px #00ff8850,
      0 0 80px #00ff8830;
    animation: bearGlow 2s ease-in-out infinite, glitchBear 4s infinite;
    transition: transform 0.15s;
  }

  .tool-link:nth-child(2) {
    color: var(--accent2);
    text-shadow:
      0 0 10px #ff00ff,
      0 0 20px #ff00ff80,
      0 0 40px #ff00ff50,
      0 0 80px #ff00ff30;
    animation: magentaGlow 2s ease-in-out infinite, glitchBear 4s infinite 0.5s;
  }

  .tool-link:nth-child(3) {
    color: var(--accent3);
    text-shadow:
      0 0 10px #00d4ff,
      0 0 20px #00d4ff80,
      0 0 40px #00d4ff50,
      0 0 80px #00d4ff30;
    animation: cyanGlow 2s ease-in-out infinite, glitchBear 4s infinite 1s;
  }

  .tool-label {
    font-size: 0.7rem;
    margin-top: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    opacity: 0.7;
  }

  .tool-link:hover {
    filter: brightness(1.3);
    transform: scale(1.15);
  }
  .tool-link:active {
    transform: scale(0.96);
  }

  @keyframes bearGlow {
    0%, 100% { text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff8880, 0 0 40px #00ff8850, 0 0 80px #00ff8830; }
    50% { text-shadow: 0 0 15px #00ff88, 0 0 30px #00ff88, 0 0 60px #00ff8880, 0 0 100px #00ff8850, 0 0 150px #00ff8820; }
  }

  @keyframes magentaGlow {
    0%, 100% { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff80, 0 0 40px #ff00ff50, 0 0 80px #ff00ff30; }
    50% { text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff, 0 0 60px #ff00ff80, 0 0 100px #ff00ff50, 0 0 150px #ff00ff20; }
  }

  @keyframes cyanGlow {
    0%, 100% { text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff80, 0 0 40px #00d4ff50, 0 0 80px #00d4ff30; }
    50% { text-shadow: 0 0 15px #00d4ff, 0 0 30px #00d4ff, 0 0 60px #00d4ff80, 0 0 100px #00d4ff50, 0 0 150px #00d4ff20; }
  }

  @keyframes glitchBear {
    0%, 100% { transform: translate(0); }
    2%  { transform: translate(-3px, 2px) skewX(-2deg); }
    4%  { transform: translate(3px, -1px) skewX(1deg); }
    6%  { transform: translate(0); }
    50% { transform: translate(0); }
    52% { transform: translate(2px, -3px) skewX(3deg); }
    53% { transform: translate(-4px, 1px) skewX(-1deg); }
    55% { transform: translate(0); }
  }

  /* ── Mobile ──────────────────────────────────────────────── */
  @media (max-width: 600px) {
    body { overflow: auto; min-height: 100dvh; }
    .card { padding: 1.5rem 1rem; }
    .nav-links {
      flex-direction: column;
      gap: 2rem;
    }
    .tool-link { font-size: 2.5rem; }
    .tool-label { font-size: 0.65rem; }
    .ambient--green  { width: 250px; height: 250px; }
    .ambient--magenta { width: 200px; height: 200px; }
    .ambient--cyan    { width: 180px; height: 180px; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .bear-link,
    .bear-link::before,
    .bear-link::after,
    .card { animation: none; }
    .bear-link { transition: none; }
  }
</style>
</head>
<body>
  <div class="ambient ambient--green"></div>
  <div class="ambient ambient--magenta"></div>
  <div class="ambient ambient--cyan"></div>
  <div class="card">
    <div class="nav-links">
      <a href="JLViewer.html" class="tool-link">
        ʕ•͡ᴥ•ʔ
        <span class="tool-label">Viewer</span>
      </a>
      <a href="frame-compare.html" class="tool-link">
        (╯°□°)╯︵┻━┻
        <span class="tool-label">Frame Compare</span>
      </a>
      <a href="ms_clock.html" class="tool-link">
        (⏱ ͜ʖ⏱)
        <span class="tool-label">Clock</span>
      </a>
    </div>
  </div>
</body>
</html>
